<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Calcolatore Biga (Metodo Impasto)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">
  <h2>🍞 Calcolatore Biga</h2>
  <p><b>Metodo: farina impasto</b></p>

  <p>Inserisci farina impasto (grammi)</p>
  <input type="number" id="farina" placeholder="es. 5000" oninput="calcola()">

  <div class="result" id="output"></div>

  <div class="note">
    Biga: 28,8% della farina impasto • idratazione 44% • lievito 1%<br>
    Impasto: acqua 60% • lievito 1% • malto 1% • sale 2% sulla farina totale
  </div>
</div>

<script>
function calcola() {
  let Fi = parseFloat(document.getElementById("farina").value);
  if (!Fi) {
    document.getElementById("output").innerHTML = "";
    return;
  }

  // BIGA
  let bigaTot = Fi * 0.288;
  let farinaBiga = bigaTot / 1.44;
  let acquaBiga = farinaBiga * 0.44;
  let lievitoBigaFresco = farinaBiga * 0.01;
  let lievitoBigaSecco = lievitoBigaFresco / 2;

  // FARINA TOTALE
  let farinaTotale = Fi + farinaBiga;

  // IMPASTO
  let acquaImpasto = Fi * 0.60;
  let lievitoImpastoFresco = Fi * 0.01;
  let lievitoImpastoSecco = lievitoImpastoFresco / 2;
  let malto = Fi * 0.01;
  let sale = farinaTotale * 0.02;

  document.getElementById("output").innerHTML = `
    <h3>🧱 Biga</h3>
    Totale: ${bigaTot.toFixed(0)} g<br>
    Farina: ${farinaBiga.toFixed(0)} g<br>
    Acqua fredda: ${acquaBiga.toFixed(0)} g<br>
    Lievito fresco: ${lievitoBigaFresco.toFixed(1)} g
    <br><span style="font-size:16px;color:#555;">(secco: ${lievitoBigaSecco.toFixed(1)} g)</span><br>

    <h3>🍞 Impasto</h3>
    Farina impasto: ${Fi.toFixed(0)} g<br>
    Acqua fredda (60%): ${acquaImpasto.toFixed(0)} g<br>
    Lievito fresco (1%): ${lievitoImpastoFresco.toFixed(0)} g
    <br><span style="font-size:16px;color:#555;">(secco: ${lievitoImpastoSecco.toFixed(1)} g)</span><br>
    Malto (1%): ${malto.toFixed(0)} g<br>
    Sale (2% farina totale): ${sale.toFixed(0)} g<br>
  `;
}
</script>

</body>
</html>
