<script>
function calcola() {
  let f = parseFloat(document.getElementById("farina").value);
  if (!f) return;

  // BIGA (30% del peso impasto)
  let biga = f * 0.3;

  // BIGA (44% idratazione)
  let bigaFarina = biga / 1.44;
  let bigaAcqua = biga - bigaFarina;

  // Lievito biga
  let lievitoBigaFresco = bigaFarina * 0.01;
  let lievitoBigaSecco = lievitoBigaFresco / 3;

  // IMPASTO (percentuali su farina impasto)
  let acquaImpasto = f * 0.60;
  let lievitoImpastoFresco = f * 0.01;
  let lievitoImpastoSecco = lievitoImpastoFresco / 3;

  // 🔥 FARINA TOTALE (CORRETTO)
  let farinaTot = f + bigaFarina;

  // 🔥 SALE CORRETTO (2% su totale farine)
  let sale = farinaTot * 0.02;

  document.getElementById("output").innerHTML = `
    <h3>🧱 Biga (30%)</h3>
    Peso: <b>${biga.toFixed(0)} g</b><br>
    Farina: ${bigaFarina.toFixed(0)} g<br>
    Acqua: ${bigaAcqua.toFixed(0)} g<br>
    Lievito fresco: ${lievitoBigaFresco.toFixed(1)} g<br>
    Lievito secco: ${lievitoBigaSecco.toFixed(1)} g<br>

    <h3>🍞 Impasto</h3>
    Farina: ${f.toFixed(0)} g<br>
    Acqua: ${acquaImpasto.toFixed(0)} g<br>
    Lievito fresco: ${lievitoImpastoFresco.toFixed(0)} g<br>
    Lievito secco: ${lievitoImpastoSecco.toFixed(1)} g<br>

    <h3>🧂 Sale</h3>
    ${sale.toFixed(0)} g (2% su farine totali)

    <div class="note">
      Nota: la biga è calcolata come farina + acqua (lievito escluso dal peso)
    </div>
  `;
}
</script>
