<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Calcolatore Biga</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background: #f7f7f7;
    }
    .box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      font-size: 20px;
      padding: 10px;
      width: 80%;
      margin: 10px 0;
    }
    .result {
      margin-top: 20px;
      text-align: left;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>🍞 Calcolatore Biga</h2>

  <p>Inserisci farina totale (grammi)</p>
  <input type="number" id="farina" placeholder="es. 1000" oninput="calcola()">

  <div class="result" id="output"></div>
</div>

<script>
function calcola() {
  let f = document.getElementById("farina").value;
  if (!f) return;

  let bigaFarina = f * 0.3;
  let bigaAcqua = bigaFarina * 0.44;
  let bigaLievito = bigaFarina * 0.007;

  let impFarina = f - bigaFarina;
  let acquaTot = f * 0.65;
  let impAcqua = acquaTot - bigaAcqua;
  let sale = f * 0.02;

  document.getElementById("output").innerHTML = `
    <h3>🧱 Biga</h3>
    Farina: ${bigaFarina.toFixed(0)} g<br>
    Acqua: ${bigaAcqua.toFixed(0)} g<br>
    Lievito: ${bigaLievito.toFixed(1)} g<br>

    <h3>🍞 Impasto</h3>
    Farina: ${impFarina.toFixed(0)} g<br>
    Acqua: ${impAcqua.toFixed(0)} g<br>
    Sale: ${sale.toFixed(0)} g<br>
  `;
}
</script>

</body>
</html>
